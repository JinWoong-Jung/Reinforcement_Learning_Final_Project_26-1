# ABLATION 5-A: Action granularity — 10-second time unit
# Baseline comparison: action_10s / default(30s) / action_60s.yaml
#
# What changes: exam.action_time_unit_sec = 10
#   → Each solve_more step spends 10 seconds (vs 30s default).
#   → Finer control: the agent can allocate time in smaller increments.
#   → Episode length in steps grows ~3× vs default (more decisions per episode).
#   → Network sees more transitions per second of simulated exam time.
# Trade-off: longer episodes slow training; more steps needed to learn.
#
# Expected: finer granularity should allow better marginal-gain decisions
# and higher final score, at the cost of harder credit assignment.

experiment:
  name: "ablation_action_10s"
  seed: 42

exam:
  total_time_sec: 6000
  action_time_unit_sec: 10      # ← ABLATION (default: 30)
  switch_time_sec: 10
  randomize_start_problem: true
  allow_agent_selected_start_problem: false
  reveal_difficulty: false
  difficulty_time_priors_sec:
    하: 30
    중하: 60
    중: 90
    상: 300
    최상: 600
  first_pass:
    enabled: true
    prefer_sequential: true
    enforce_unvisited_before_revisit: true
  revisit_policy:
    prefer_worked_problems: true
    cooldown_entries: 2
  solve_more_constraints:
    enabled: true
    objective_conf_threshold: 0.95
    subjective_conf_threshold: 0.95
    streak_threshold: 60         # 3× to match 30s streak_threshold=20

dynamics:
  anchor_source: "correct_rate"
  subjective_floor: 0.02
  ambiguity_weight: 0.5
  theta_scale: 3.0
  beta: 2.0
  alpha: 2.0
  tau: 60.0
  ability_weights:
    skill_global: 0.45
    skill_accuracy: 0.30
    skill_speed: 0.25

reward:
  next:
    penalty: 0.0
    new_problem_bonus: 0.0
    coverage_bonus_scale: 0.0
    coverage_bonus_power: 1.0
    no_work_revisit_penalty: 0.0
    first_pass:
      sequential_bonus: 0.0
      revisit_penalty: 0.0
    difficulty_exit:
      easy: {low_conf_threshold: 0.0, low_conf_penalty: 0.0, ready_threshold: 1.1, ready_bonus: 0.0}
      mid:  {low_conf_threshold: 0.0, low_conf_penalty: 0.0, ready_threshold: 1.1, ready_bonus: 0.0}
      hard: {defer_threshold: 0.0,    defer_bonus: 0.0,      ready_threshold: 1.1, ready_bonus: 0.0}
  solve_more:
    penalty: 0.0
    low_marginal_gain: {subjective_threshold: 0.0, objective_threshold: 0.0, penalty: 0.0}
    saturation:
      subjective: {threshold: 1.1, penalty: 0.0}
      objective:  {threshold: 1.1, penalty: 0.0}
    streak: {threshold: 9999, penalty: 0.0, extra_penalty_scale: 0.0, max_extra_steps: 0}
  terminal:
    timeout_penalty: 0.0
    completion_bonus: 0.0
    concentration:
      top1: {threshold: 1.1, penalty_scale: 0.0}
      top2: {threshold: 1.1, penalty_scale: 0.0}

training:
  algorithm: "ppo"
  device: "cpu"
  total_steps: 1000000          # more steps needed for longer episodes
  eval_episodes: 100
  progress_log_freq: 100000
  checkpoint_freq: 100000
  score_log_freq: 100000
  score_log_eval_episodes: 10
  strategy_constraint:
    name: null

evaluation:
  solved:
    subjective_conf_threshold: 0.5
    objective_conf_threshold: 0.5
    objective_margin_threshold: 0.05

ppo:
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.02
  vf_coef: 0.5
  n_steps: 8192                 # larger rollout buffer for longer episodes
  batch_size: 256
  n_epochs: 10
  net_arch: [256, 256]

dqn:
  learning_rate: 1.0e-4
  gamma: 0.99
  buffer_size: 200000           # larger replay buffer for longer episodes
  learning_starts: 20000
  batch_size: 128
  train_freq: 4
  target_update_interval: 2000
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.05
  exploration_fraction: 0.2

data:
  exam_paths:
    - data/25_math_calculus.json
    - data/25_math_geometry.json
    - data/25_math_prob_stat.json
  student_preset_path: data/student_level_presets.json
