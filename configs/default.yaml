# Global experiment settings
experiment:
  name: "RLProject"
  seed: 42

# Exam environment settings
exam:
  total_time_sec: 6000          # 100 minutes
  num_problems: 30
  action_time_unit_sec: 30      # e.g., 30 or 60 seconds
  switch_time_sec: 10           # time cost for moving to another problem
  randomize_start_problem: true
  allow_agent_selected_start_problem: false   # true: first action selects start problem (no switch cost)
  reveal_difficulty: false      # student/agent cannot directly observe true difficulty
  difficulty_time_priors_sec:
    하: 30
    중하: 60
    중: 90
    상: 300
    최상: 600
  first_pass:
    enabled: true
    prefer_sequential: true
    enforce_unvisited_before_revisit: true
  revisit_policy:
    prefer_worked_problems: true
    cooldown_entries: 2
  solve_more_constraints:
    enabled: true
    objective_conf_threshold: 0.95
    subjective_conf_threshold: 0.95
    streak_threshold: 20

# Confidence dynamics model
# p_i(t | s) = floor + (1 - floor) * sigmoid(theta - beta*d - gamma*a + alpha*log(1 + t/tau))
#   floor  = guessing probability (1/K for objective, subjective_floor for subjective)
#   theta  = theta_scale * (ability - 0.5)   -- student ability logit
#   d      = difficulty anchor (1 - correct_rate, or difficulty as fallback)
#   a      = choice entropy in [0,1]          -- problem ambiguity
#   alpha  = time learning rate
#   tau    = time scale in seconds
dynamics:
  anchor_source: "correct_rate"      # "correct_rate" (preferred) or "difficulty"
  subjective_floor: 0.02             # floor probability for subjective problems
  ambiguity_weight: 0.5              # gamma: how much choice entropy slows learning
  theta_scale: 3.0                   # how strongly student ability shifts the logit
  beta: 2.0                          # how strongly difficulty anchor suppresses confidence
  alpha: 2.0                         # time learning rate
  tau: 60.0                          # time scale in seconds (log(1 + t/tau))
  ability_weights:
    skill_global: 0.45
    skill_accuracy: 0.30
    skill_speed: 0.25

# Reward configuration
# Base reward is delta expected_total_score (pure reward form).
# All shaping terms default to 0 / off.
# For ablation experiments, override individual keys in a separate config.
reward:
  next:
    penalty: 0.0
    new_problem_bonus: 0.0
    coverage_bonus_scale: 0.0
    coverage_bonus_power: 1.0
    no_work_revisit_penalty: 0.0
    first_pass:
      sequential_bonus: 0.0
      revisit_penalty: 0.0
    difficulty_exit:
      easy:
        low_conf_threshold: 0.0
        low_conf_penalty: 0.0
        ready_threshold: 1.1
        ready_bonus: 0.0
      mid:
        low_conf_threshold: 0.0
        low_conf_penalty: 0.0
        ready_threshold: 1.1
        ready_bonus: 0.0
      hard:
        defer_threshold: 0.0
        defer_bonus: 0.0
        ready_threshold: 1.1
        ready_bonus: 0.0
  solve_more:
    penalty: 0.0
    low_marginal_gain:
      subjective_threshold: 0.0
      objective_threshold: 0.0
      penalty: 0.0
    saturation:
      subjective:
        threshold: 1.1
        penalty: 0.0
      objective:
        threshold: 1.1
        penalty: 0.0
    streak:
      threshold: 9999
      penalty: 0.0
      extra_penalty_scale: 0.0
      max_extra_steps: 0
  terminal:
    timeout_penalty: 0.0
    completion_bonus: 0.0
    concentration:
      top1:
        threshold: 1.1
        penalty_scale: 0.0
      top2:
        threshold: 1.1
        penalty_scale: 0.0

# Agent training config
training:
  algorithm: "ppo"              # options: ppo, dqn
  device: "cpu"                # options: auto, cpu, cuda, mps
  total_steps: 1000000
  eval_episodes: 100
  progress_log_freq: 10000
  checkpoint_freq: 10000
  strategy_constraint:
    name: null                  # fixed_order_free_time, equal_time_free_order, or null

# Evaluation / solved criteria
evaluation:
  solved:
    subjective_conf_threshold: 0.5
    objective_conf_threshold: 0.5
    objective_margin_threshold: 0.05

# PPO hyperparameters (used when training.algorithm == "ppo")
ppo:
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.02
  vf_coef: 0.5
  n_steps: 4096            # increased: captures more complete episodes per update
  batch_size: 128
  n_epochs: 10
  net_arch: [256, 256]     # larger network for 212-dim observation (was default [64, 64])

# DQN hyperparameters (used when training.algorithm == "dqn")
dqn:
  learning_rate: 1.0e-4
  gamma: 0.99
  buffer_size: 100000
  learning_starts: 10000
  batch_size: 128
  train_freq: 4
  target_update_interval: 1000
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.05
  exploration_fraction: 0.2

# Data sources
data:
  exam_paths:
    - data/25_math_calculus.json
    - data/25_math_geometry.json
    - data/25_math_prob_stat.json
  student_preset_path: data/student_level_presets.json
