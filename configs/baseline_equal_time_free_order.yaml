# Baseline 2: each problem gets 200 seconds, problem order is trainable.
experiment:
  name: "baseline_equal_time_free_order"
  seed: 42

exam:
  total_time_sec: 6000
  num_problems: 30
  action_time_unit_sec: 10
  switch_time_sec: 0
  randomize_start_problem: true
  reveal_difficulty: false
  difficulty_time_priors_sec:
    하: 30
    중하: 60
    중: 90
    상: 300
    최상: 600
  difficulty_target_confidences:
    하: 0.82
    중하: 0.74
    중: 0.68
    상: 0.52
    최상: 0.45
  problem_type_target_bonus:
    objective: 0.03
    subjective: 0.0
  first_pass:
    enabled: false
    prefer_sequential: false
    enforce_unvisited_before_revisit: false
  revisit_policy:
    prefer_worked_problems: false
    cooldown_entries: 0
  solve_more_constraints:
    enabled: false
    objective_conf_threshold: 0.95
    subjective_conf_threshold: 0.95
    streak_threshold: 20

reward:
  next:
    penalty: 0.0
    new_problem_bonus: 0.02
    coverage_bonus_scale: 0.3
    coverage_bonus_power: 2.0
    no_work_revisit_penalty: -0.08
    first_pass:
      sequential_bonus: 0.0
      revisit_penalty: 0.0
    difficulty_exit:
      easy:
        low_conf_threshold: 0.5
        low_conf_penalty: -0.08
        ready_threshold: 0.7
        ready_bonus: 0.08
      mid:
        low_conf_threshold: 0.4
        low_conf_penalty: -0.04
        ready_threshold: 0.6
        ready_bonus: 0.05
      hard:
        defer_threshold: 0.45
        defer_bonus: 0.04
        ready_threshold: 0.35
        ready_bonus: 0.06
  solve_more:
    penalty: -0.003
    low_marginal_gain:
      subjective_threshold: 0.01
      objective_threshold: 0.01
      penalty: -0.02
    saturation:
      subjective:
        threshold: 0.90
        penalty: -0.03
      objective:
        threshold: 0.90
        penalty: -0.05
    streak:
      threshold: 8
      penalty: 0.0
      extra_penalty_scale: -0.003
      max_extra_steps: 40
  terminal:
    timeout_penalty: -1.0
    completion_bonus: 5.0
    concentration:
      top1:
        threshold: 0.70
        penalty_scale: -8.0
      top2:
        threshold: 0.90
        penalty_scale: -6.0

training:
  algorithm: "ppo"
  device: "cpu"
  total_steps: 100000
  eval_episodes: 100
  progress_log_freq: 10000
  checkpoint_freq: 10000
  strategy_constraint:
    name: equal_time_free_order
    time_budget_sec: 200

evaluation:
  solved:
    subjective_conf_threshold: 0.5
    objective_conf_threshold: 0.5
    objective_margin_threshold: 0.05

ppo:
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.02
  vf_coef: 0.5
  n_steps: 4096
  batch_size: 128
  n_epochs: 10
  net_arch: [256, 256]

dqn:
  learning_rate: 1.0e-4
  gamma: 0.99
  buffer_size: 100000
  learning_starts: 10000
  batch_size: 128
  train_freq: 4
  target_update_interval: 1000
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.05
  exploration_fraction: 0.2

data:
  exam_paths:
    - data/25_math_calculus.json
    - data/25_math_geometry.json
    - data/25_math_prob_stat.json
  student_path: data/someone.json
  student_preset_path: data/student_level_presets.json
