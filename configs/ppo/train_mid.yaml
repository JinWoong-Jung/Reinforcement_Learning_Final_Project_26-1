# Phase B training config: mid-theta student policy
# Based on configs/phaseB/base.yaml with student.fixed_id = "mid".

experiment:
  name: "train_mid"
  seed: 42

exam:
  total_time_sec: 6000 # Total time for the exam in seconds (100 minutes)
  num_problems: 30 # Total number of problems in the exam (30 problems)
  action_time_unit_sec: 30 # Time unit for each action in seconds (30 seconds)
  switch_time_sec: 10 # Time taken to switch between problems in seconds (10 seconds)
  randomize_start_problem: false
  allow_agent_selected_start_problem: true
  difficulty_time_priors_sec:
    하: 30
    중하: 60
    중: 120
    상: 300
    최상: 600
  first_pass:
    enabled: true
    prefer_sequential: true
    enforce_unvisited_before_revisit: true
  revisit_policy:
    prefer_worked_problems: true
    cooldown_entries: 1
  solve_more_constraints:
    enabled: true
    use_difficulty_time_priors: false
    objective_conf_threshold: 0.95
    subjective_conf_threshold: 0.95
    streak_threshold: 20

student:
  fixed_id: "mid"

dynamics:
  anchor_source: "difficulty"
  subjective_floor: 0.0
  ambiguity_weight: 1.7
  beta: 2.9
  alpha: 1.6
  tau: 200.0

reward:
  next:
    penalty: -0.002
    new_problem_bonus: 0.0
    coverage_bonus_scale: 0.0
    coverage_bonus_power: 1.0
    no_work_revisit_penalty: -0.02
    first_pass:
      sequential_bonus: 0.0
      revisit_penalty: 0.0
    difficulty_exit:
      easy: {low_conf_threshold: 0.0, low_conf_penalty: 0.0, ready_threshold: 1.1, ready_bonus: 0.0}
      mid:  {low_conf_threshold: 0.0, low_conf_penalty: 0.0, ready_threshold: 1.1, ready_bonus: 0.0}
      hard: {defer_threshold: 0.0,    defer_bonus: 0.0,      ready_threshold: 1.1, ready_bonus: 0.0}

  solve_more:
    penalty: 0.0
    low_marginal_gain: {subjective_threshold: 0.0, objective_threshold: 0.0, penalty: 0.0}
    saturation:
      subjective: {threshold: 1.1, penalty: 0.0}
      objective:  {threshold: 1.1, penalty: 0.0}
    streak: {threshold: 9999, penalty: 0.0, extra_penalty_scale: 0.0, max_extra_steps: 0}

  terminal:
    timeout_penalty: 0.0
    completion_bonus: 0.5
    concentration:
      top1: {threshold: 1.1, penalty_scale: 0.0}
      top2: {threshold: 1.1, penalty_scale: 0.0}

training:
  algorithm: "ppo"
  device: "cpu"
  total_steps: 10000000
  eval_episodes: 100
  progress_log_freq: 50000
  checkpoint_freq: 500000
  score_log_freq: 500000
  score_log_eval_episodes: 5
  n_envs: 8
  strategy_constraint:
    name: null

evaluation:
  solved:
    subjective_conf_threshold: 0.5
    objective_conf_threshold: 0.5
    objective_margin_threshold: 0.05

ppo:
  learning_rate: 1e-4
  gamma: 0.995
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  n_steps: 8192
  batch_size: 256
  n_epochs: 10
  net_arch: [256, 256]

data:
  exam_paths:
    - data/25_math_calculus.json
    - data/25_math_geometry.json
    - data/25_math_prob_stat.json
  student_path: data/theta_students.json
